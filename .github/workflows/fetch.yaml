name: Fetch and Process Subscriptions

on:
  workflow_dispatch:

  schedule:
    - cron: '5 */6 * * *'
  watch:
    types: started

permissions:
  contents: write

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: 迁出代码
      uses: actions/checkout@v4

    - name: 安装Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: 加载缓存
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: 安装依赖
      run: pip install -r ./requirements.txt

    # 第一步：采集订阅源
    - name: 采集订阅源
      run: python ./main.py

    # 第二步：保存采集结果
    - name: 提交采集结果
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add ./sub
        git diff --staged --quiet || git commit -m "🍀 爬取订阅源 $(date '+%Y-%m-%d %H:%M:%S')"
        git push || true

    # 第三步：节点筛选和测速
    - name: 节点筛选和测速
      run: python ./node_processor.py

    # 第四步：保存可用节点
    - name: 提交可用节点
      run: |
        git add ./available_nodes_clash.yaml ./available_nodes_base64.txt || true
        git diff --staged --quiet || git commit -m "✨ 更新可用节点 $(date '+%Y-%m-%d %H:%M:%S')"
        git push || true
