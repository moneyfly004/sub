name: Process Nodes - Filter and Speed Test

# 在订阅抓取完成后自动运行
on:
  workflow_dispatch:  # 手动触发

  # 每天运行一次（在订阅抓取之后）
  schedule:
    - cron: '30 */6 * * *'  # 每6小时的30分运行（比fetch晚25分钟）

jobs:
  process-nodes:
    runs-on: ubuntu-latest

    steps:
    - name: 迁出代码
      uses: actions/checkout@v2
      with:
        fetch-depth: 0  # 获取完整历史

    - name: 拉取最新更改
      run: |
        git pull origin main

    - name: 安装Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: 加载缓存
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'

    - name: 安装依赖
      run: |
        pip install -r ./requirements.txt

    - name: 执行节点处理
      run: |
        python ./node_processor.py

    - name: 提交可用节点
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add ./available_nodes_clash.yaml ./available_nodes_base64.txt || true

        if git diff --staged --quiet; then
          echo "没有变化，跳过提交"
        else
          git commit -m "✨ 更新可用节点 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
        fi
